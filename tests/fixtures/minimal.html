<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Example</title>
</head>
<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>

  <main>
    <article>
      <h1>Welcome to Our Site</h1>
      <p>This is a well-structured page with semantic HTML.</p>

      <section>
        <h2>Main Section</h2>
        <p>This content is easy for agents to understand.</p>

        <form>
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" />

          <label for="message">Message:</label>
          <textarea id="message" name="message"></textarea>

          <button type="submit">Send</button>
        </form>
      </section>

      <section>
        <h2>Images</h2>
        <img
          src="/image1.jpg"
          alt="A descriptive alt text for the first image"
        />
        <img
          src="/image2.jpg"
          alt="Another well-described image"
        />
      </section>
    </article>

    <aside>
      <h3>Related</h3>
      <ul>
        <li><a href="/article1">Related Article 1</a></li>
        <li><a href="/article2">Related Article 2</a></li>
      </ul>
    </aside>
  </main>

  <footer>
    <p>&copy; 2024 Example Corp. All rights reserved.</p>
  </footer>
</body>
</html>
